<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0a1628"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="القرآن الكريم"/>
<link rel="manifest" href="manifest.json"/>
<title>القرآن الكريم</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Cairo:wght@400;600;700;900&display=swap');

/* ── Themes ── */
[data-theme="dark"] {
  --bg:#0a1628;--surface:#0f2040;--card:#152848;--gold:#d4a843;--gold2:#f0c96e;
  --text:#e8dcc8;--muted:#7a9abb;--border:#1e3a5f;--nav:#0f2040;
}
[data-theme="light"] {
  --bg:#f5f0e8;--surface:#fff;--card:#fff;--gold:#b8860b;--gold2:#c8922a;
  --text:#1a1208;--muted:#6b5f4f;--border:#e0d5c5;--nav:#fff;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background 0.3s,color 0.3s}

header{background:var(--surface);padding:12px 16px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-family:'Amiri',serif;font-size:1.3rem;font-weight:700;color:var(--gold)}
.header-actions{display:flex;gap:8px}
.icon-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);cursor:pointer;font-size:1rem}
.search-box{position:relative}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 16px 9px 36px;color:var(--text);font-family:'Cairo',sans-serif;font-size:0.85rem;outline:none}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.9rem}

.page{display:none;padding:14px 14px 80px;position:relative;z-index:1}
.page.active{display:block}

/* ── Home ── */
.hero{background:linear-gradient(135deg,#0f2040,#1a3560);border-radius:16px;padding:20px;margin-bottom:14px;text-align:center;border:1px solid #1e3a5f}
[data-theme="light"] .hero{background:linear-gradient(135deg,#1a3560,#2a4a7f)}
.hero-basmala{font-family:'Amiri',serif;font-size:1.6rem;color:var(--gold);margin-bottom:4px}
.hero-sub{font-size:0.75rem;color:#b0a090}
.stats-row{display:flex;gap:8px;margin-bottom:14px}
.stat-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.stat-n{font-size:1.2rem;font-weight:900;color:var(--gold)}
.stat-l{font-size:0.65rem;color:var(--muted)}

/* Prayer times */
.prayer-card{background:linear-gradient(135deg,var(--surface),var(--card));border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:14px}
.prayer-title{font-size:0.85rem;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.prayer-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.prayer-item{text-align:center;padding:8px 4px;border-radius:10px;background:var(--bg);border:1px solid var(--border)}
.prayer-item.next{background:var(--gold);border-color:var(--gold)}
.prayer-item.next .prayer-name,.prayer-item.next .prayer-time{color:#0a1628}
.prayer-name{font-size:0.62rem;color:var(--muted);margin-bottom:2px}
.prayer-time{font-size:0.78rem;font-weight:700;color:var(--text)}

/* Khatma */
.khatma-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:14px}
.khatma-title{font-size:0.85rem;font-weight:700;color:var(--gold);margin-bottom:10px}
.khatma-progress{height:10px;background:var(--bg);border-radius:99px;overflow:hidden;margin-bottom:8px}
.khatma-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px;transition:width 0.5s}
.khatma-info{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--muted);margin-bottom:10px}
.khatma-btns{display:flex;gap:8px}
.khatma-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;font-size:0.75rem;cursor:pointer}
.khatma-btn.primary{background:var(--gold);border-color:var(--gold);color:#0a1628;font-weight:700}

/* Surah List */
.cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Cairo',sans-serif;font-size:0.78rem;cursor:pointer;white-space:nowrap}
.cat-btn.active{background:var(--gold);border-color:var(--gold);color:#0a1628;font-weight:700}
.surah-list{display:flex;flex-direction:column;gap:6px}
.surah-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.2s}
.surah-card:active{transform:scale(0.98)}
.surah-num{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:900;color:#0a1628;flex-shrink:0}
.surah-info{flex:1}
.surah-name-ar{font-family:'Amiri',serif;font-size:1rem;color:var(--gold2);margin-bottom:1px}
.surah-meta{font-size:0.68rem;color:var(--muted)}
.surah-verses{font-size:0.68rem;color:var(--gold);font-weight:700;text-align:center}

/* Reader */
.back-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 16px;color:var(--gold);font-family:'Cairo',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.reader-header{background:var(--surface);border-radius:14px;padding:16px;margin-bottom:10px;text-align:center;border:1px solid var(--border)}
.reader-surah-name{font-family:'Amiri',serif;font-size:1.8rem;color:var(--gold);margin-bottom:3px}
.reader-info{font-size:0.75rem;color:var(--muted);margin-bottom:8px}
.basmala{font-family:'Amiri Quran','Amiri',serif;font-size:1.3rem;color:var(--gold2);line-height:2}

.audio-bar{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.audio-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.reciter-name{flex:1;font-size:0.82rem;color:var(--gold2);font-weight:700}
.audio-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:8px}
.play-btn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#0a1628;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ctrl-small{width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.audio-status{text-align:center;font-size:0.72rem;color:var(--gold);min-height:18px}

.controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ctrl-btn{flex:1;min-width:80px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-family:'Cairo',sans-serif;font-size:0.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.ctrl-btn.active{background:var(--gold);color:#0a1628;border-color:var(--gold);font-weight:700}
.font-controls{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 12px;margin-bottom:10px}
.font-label{font-size:0.75rem;color:var(--muted);flex:1}
.font-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--gold);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}

.ayah-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:6px;transition:all 0.2s;cursor:pointer}
.ayah-block.playing{border-color:var(--gold);background:var(--surface);box-shadow:0 0 12px rgba(212,168,67,0.2)}
.ayah-text{font-family:'Amiri Quran','Amiri',serif;font-size:1.4rem;line-height:2.2;color:var(--text);text-align:right;margin-bottom:6px}
.ayah-num-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--gold);border-radius:50%;font-size:0.62rem;font-weight:900;color:#0a1628;margin-right:3px;vertical-align:middle}
.ayah-footer{display:flex;align-items:center;gap:8px}
.ayah-play-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 10px;color:var(--gold);font-size:0.68rem;cursor:pointer}
.ayah-play-btn.playing{background:var(--gold);color:#0a1628;border-color:var(--gold)}
.ayah-translation{font-size:0.8rem;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);padding-top:7px;margin-top:7px;display:none}
.ayah-translation.show{display:block}

/* Mushaf */
.mushaf-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mushaf-nav button{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;color:var(--gold);font-family:'Cairo',sans-serif;font-size:0.82rem;cursor:pointer}
.mushaf-page-num{font-size:0.85rem;font-weight:700;color:var(--gold)}
.mushaf-img{width:100%;border-radius:12px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.mushaf-loading{text-align:center;padding:40px;color:var(--muted)}

/* Search */
.search-page-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:0.95rem;outline:none;margin-bottom:14px}
.search-page-input:focus{border-color:var(--gold)}
.search-results{display:flex;flex-direction:column;gap:8px}
.search-result-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer}
.result-surah{font-size:0.72rem;color:var(--gold);margin-bottom:4px;font-weight:700}
.result-text{font-family:'Amiri',serif;font-size:1rem;color:var(--text);line-height:1.8}
.result-highlight{background:rgba(212,168,67,0.3);border-radius:3px;padding:0 2px}

/* Reciters */
.reciter-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px}
.reciter-card.selected{border-color:var(--gold);background:var(--surface)}
.reciter-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.reciter-info{flex:1}
.reciter-name-ar{font-size:0.9rem;font-weight:700;color:var(--gold2);margin-bottom:1px}
.reciter-style{font-size:0.68rem;color:var(--muted)}
.reciter-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.75rem}
.reciter-card.selected .reciter-check{background:var(--gold);border-color:var(--gold);color:#0a1628}

/* Bookmarks */
.bookmark-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:8px}
.bm-icon{font-size:1.4rem}
.bm-info{flex:1}
.bm-name{font-size:0.88rem;font-weight:700;color:var(--gold2)}
.bm-sub{font-size:0.68rem;color:var(--muted)}
.bm-del{background:transparent;border:none;color:#e74c3c;cursor:pointer;font-size:0.9rem;padding:4px}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--nav);display:flex;border-top:1px solid var(--border);z-index:100}
.nav-item{flex:1;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:0.58rem}
.nav-item.active{color:var(--gold)}
.nav-icon{font-size:1.2rem}

/* Mini Player */
.mini-player{position:fixed;bottom:56px;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:8px 14px;display:none;align-items:center;gap:10px;z-index:90}
.mini-player.show{display:flex}
.mini-info{flex:1}
.mini-surah{font-size:0.75rem;font-weight:700;color:var(--gold2)}
.mini-ayah{font-size:0.65rem;color:var(--muted)}
.mini-play{width:32px;height:32px;border-radius:50%;background:var(--gold);border:none;color:#0a1628;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mini-stop{width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:0.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Section titles */
.section-title{font-size:1rem;font-weight:800;margin-bottom:12px;color:var(--gold2);display:flex;align-items:center;gap:6px}

/* Loading */
.loading{text-align:center;padding:40px 0;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 0;color:var(--muted)}
.empty-state span{font-size:2.5rem;display:block;margin-bottom:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body data-theme="dark">

<header>
  <div class="header-top">
    <div class="app-title">🌙 القرآن الكريم</div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
      <button class="icon-btn" onclick="goPage('search-page')">🔍</button>
    </div>
  </div>
  <div class="search-box" id="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" type="text" placeholder="ابحث عن سورة..." oninput="filterSurahs()"/>
  </div>
</header>

<!-- Mini Player -->
<div class="mini-player" id="mini-player">
  <div style="font-size:1.3rem">🎵</div>
  <div class="mini-info">
    <div class="mini-surah" id="mini-surah-name">-</div>
    <div class="mini-ayah" id="mini-ayah-info">-</div>
  </div>
  <button class="mini-play" id="mini-play-btn" onclick="togglePlay()">▶</button>
  <button class="mini-stop" onclick="stopAudio()">■</button>
</div>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="hero">
    <div class="hero-basmala">﷽</div>
    <div class="hero-sub">القرآن الكريم — ١١٤ سورة — ٦٢٣٦ آية</div>
  </div>

  <!-- Prayer Times -->
  <div class="prayer-card">
    <div class="prayer-title">🕌 مواقيت الصلاة — <span id="prayer-city">جاري التحديد...</span></div>
    <div class="prayer-grid" id="prayer-grid">
      <div class="loading" style="grid-column:1/-1;padding:10px"><div class="spinner" style="width:20px;height:20px;margin:0 auto"></div></div>
    </div>
  </div>

  <!-- Khatma -->
  <div class="khatma-card">
    <div class="khatma-title">📊 تتبع الختمة</div>
    <div class="khatma-progress"><div class="khatma-fill" id="khatma-fill" style="width:0%"></div></div>
    <div class="khatma-info">
      <span id="khatma-pages">٠ / ٦٠٤ صفحة</span>
      <span id="khatma-pct">٠٪</span>
    </div>
    <div class="khatma-btns">
      <button class="khatma-btn" onclick="khatmaBack()">− صفحة</button>
      <button class="khatma-btn primary" onclick="khatmaAdd()">+ أضف صفحة</button>
      <button class="khatma-btn" onclick="resetKhatma()">↺ إعادة</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-n">١١٤</div><div class="stat-l">سورة</div></div>
    <div class="stat-box"><div class="stat-n">٦٢٣٦</div><div class="stat-l">آية</div></div>
    <div class="stat-box"><div class="stat-n" id="home-reciter">مشاري</div><div class="stat-l">القارئ</div></div>
  </div>

  <div class="cats" id="cats-home"></div>
  <div class="section-title">📖 السور</div>
  <div class="surah-list" id="surah-list"></div>
</div>

<!-- READER -->
<div class="page" id="page-reader">
  <button class="back-btn" onclick="goBack()">← رجوع</button>
  <div id="reader-content"></div>
</div>

<!-- MUSHAF -->
<div class="page" id="page-mushaf">
  <div class="section-title">📖 المصحف الشريف</div>
  <div class="mushaf-nav">
    <button onclick="mushafPrev()">← السابق</button>
    <span class="mushaf-page-num">صفحة <span id="mushaf-page-num">1</span></span>
    <button onclick="mushafNext()">التالي →</button>
  </div>
  <div id="mushaf-content">
    <div class="mushaf-loading"><div class="spinner"></div>جاري تحميل الصفحة...</div>
  </div>
  <div style="display:flex;gap:8px;margin-top:10px">
    <input type="number" id="mushaf-goto" placeholder="انتقل لصفحة..." min="1" max="604" style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:0.85rem;outline:none"/>
    <button onclick="mushafGoto()" style="background:var(--gold);border:none;border-radius:10px;padding:9px 16px;color:#0a1628;font-family:'Cairo',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer">انتقل</button>
  </div>
</div>

<!-- SEARCH PAGE -->
<div class="page" id="page-search-page">
  <div class="section-title">🔍 البحث في القرآن</div>
  <input class="search-page-input" id="quran-search-input" type="text" placeholder="ابحث بكلمة أو آية..." oninput="searchQuran()"/>
  <div id="search-results-container">
    <div class="empty-state"><span>🔍</span>اكتب كلمة للبحث</div>
  </div>
</div>

<!-- RECITERS -->
<div class="page" id="page-reciters">
  <div class="section-title">🎙 اختر القارئ</div>
  <div id="reciters-grid"></div>
</div>

<!-- BOOKMARKS -->
<div class="page" id="page-bookmarks">
  <div class="section-title">🔖 المفضلة</div>
  <div id="bookmark-list"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="goPage('home')" id="nav-home"><span class="nav-icon">🏠</span>الرئيسية</button>
  <button class="nav-item" onclick="goPage('mushaf')" id="nav-mushaf"><span class="nav-icon">📖</span>المصحف</button>
  <button class="nav-item" onclick="goPage('reciters')" id="nav-reciters"><span class="nav-icon">🎙</span>القراء</button>
  <button class="nav-item" onclick="goPage('bookmarks')" id="nav-bookmarks"><span class="nav-icon">🔖</span>المفضلة</button>
</div>

<script>
// ── Data ──
const reciters = [
  { id: 'ar.alafasy',        name: 'مشاري العفاسي',      style: 'مرتّل' },
  { id: 'ar.husary',         name: 'محمود خليل الحصري',  style: 'مرتّل' },
  { id: 'ar.minshawi',       name: 'محمد صديق المنشاوي', style: 'مجوّد' },
  { id: 'ar.abdurrahmaanas', name: 'عبد الرحمن السديس',  style: 'مرتّل' },
  { id: 'ar.shaatree',       name: 'أبو بكر الشاطري',   style: 'مرتّل' },
  { id: 'ar.mahermuaiqly',   name: 'ماهر المعيقلي',      style: 'مرتّل' },
  { id: 'ar.abdullahbasfar', name: 'عبدالله بصفر',       style: 'مرتّل' },
];

// ── Prayer Times ──
async function loadPrayerTimes() {
  try {
    const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout:5000}));
    const {latitude: lat, longitude: lng} = pos.coords;
    const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=4`);
    const data = await res.json();
    const t = data.data.timings;
    const city = data.data.meta.timezone.split('/')[1]?.replace('_',' ') || 'موقعك';
    document.getElementById('prayer-city').textContent = city;
    const prayers = [
      {name:'الفجر', time:t.Fajr},
      {name:'الظهر', time:t.Dhuhr},
      {name:'العصر', time:t.Asr},
      {name:'المغرب', time:t.Maghrib},
      {name:'العشاء', time:t.Isha},
    ];
    const now = new Date();
    const nowMins = now.getHours()*60 + now.getMinutes();
    let nextIdx = prayers.findIndex(p => {
      const [h,m] = p.time.split(':').map(Number);
      return h*60+m > nowMins;
    });
    if (nextIdx === -1) nextIdx = 0;
    document.getElementById('prayer-grid').innerHTML = prayers.map((p,i) => `
      <div class="prayer-item ${i===nextIdx?'next':''}">
        <div class="prayer-name">${p.name}</div>
        <div class="prayer-time">${p.time}</div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('prayer-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:0.75rem;padding:8px">تعذّر تحديد الموقع</div>';
    document.getElementById('prayer-city').textContent = '';
  }
}

// ── Quran Search Data ──
async function loadQuranData() {
  try {
    const res = await fetch('https://api.alquran.cloud/v1/quran/quran-simple');
    const data = await res.json();
    quranData = data.data.surahs;
  } catch(e) {}
}

function searchQuran() {
  const q = document.getElementById('quran-search-input').value.trim();
  const container = document.getElementById('search-results-container');
  if (!q || q.length < 2) { container.innerHTML = '<div class="empty-state"><span>🔍</span>اكتب كلمة للبحث</div>'; return; }
  if (!quranData) { container.innerHTML = '<div class="empty-state"><span>⏳</span>جاري تحميل البيانات...</div>'; return; }

  const results = [];
  quranData.forEach(s => {
    s.ayahs.forEach(a => {
      if (a.text.includes(q)) results.push({ surahNum: s.number, surahName: s.englishName, surahNameAr: surahNames[s.number-1], ayahNum: a.numberInSurah, text: a.text });
    });
    if (results.length >= 30) return;
  });

  if (!results.length) { container.innerHTML = '<div class="empty-state"><span>🔍</span>لا توجد نتائج</div>'; return; }

  container.innerHTML = `<div style="font-size:0.75rem;color:var(--muted);margin-bottom:10px">${results.length} نتيجة</div>` +
    results.map(r => `
      <div class="search-result-item" onclick="openSurahAtAyah(${r.surahNum}, ${r.ayahNum})">
        <div class="result-surah">${r.surahNameAr} — الآية ${r.ayahNum}</div>
        <div class="result-text">${r.text.replace(q, `<span class="result-highlight">${q}</span>`)}</div>
      </div>`).join('');
}

async function openSurahAtAyah(surahNum, ayahNum) {
  await openSurah(surahNum);
  setTimeout(() => {
    const el = document.getElementById(`ayah-${ayahNum}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 500);
}

// ── Audio ──
function getSurahAudioUrl() {
  const r = getReciter();
  const num = String(currentSurah.number).padStart(3, '0');
  const urls = {
    'ar.alafasy':        `https://download.quranicaudio.com/quran/mishaari_raashid_al_3afaasee/${num}.mp3`,
    'ar.husary':         `https://download.quranicaudio.com/quran/mahmood_khaleel_al-husaree/${num}.mp3`,
    'ar.minshawi':       `https://download.quranicaudio.com/quran/mohamed_siddiq_al-minshawi/${num}.mp3`,
    'ar.abdurrahmaanas': `https://download.quranicaudio.com/quran/abdurrahmaan_as-sudais/${num}.mp3`,
    'ar.shaatree':       `https://download.quranicaudio.com/quran/abu_bakr_ash-shaatree/${num}.mp3`,
    'ar.mahermuaiqly':   `https://download.quranicaudio.com/quran/maher_al_muaiqly/${num}.mp3`,
    'ar.abdullahbasfar': `https://download.quranicaudio.com/quran/abdullah_basfar/${num}.mp3`,
  };
  return urls[r.id] || urls['ar.alafasy'];
}

function playSurahFromStart() {
  if (!currentSurah) return;
  const status = document.getElementById('audio-status');
  if (status) status.textContent = '⏳ جاري التحميل...';
  audio.pause(); audio.src = '';
  setTimeout(() => {
    audio.src = getSurahAudioUrl();
    audio.load();
    audio.oncanplay = () => {
      audio.play().then(() => {
        isPlaying = true; updatePlayUI();
        document.getElementById('mini-surah-name').textContent = currentSurah.name;
        document.getElementById('mini-ayah-info').textContent = getReciter().name + ' — كاملة';
        document.getElementById('mini-player').classList.add('show');
        if (status) status.textContent = `▶ ${currentSurah.name} — ${getReciter().name}`;
      }).catch(() => { if (status) status.textContent = '❌ تعذّر التشغيل'; });
    };
    audio.onerror = () => { if (status) status.textContent = '❌ الرابط غير متاح، جرّب قارئاً آخر'; };
    audio.onended = () => { isPlaying = false; updatePlayUI(); if (status) status.textContent = 'انتهت السورة ✓'; };
  }, 100);
}

function playAyahByNum(num) {
  const ayah = currentAyahs.find(a => a.numberInSurah === num);
  if (!ayah) return;
  const status = document.getElementById('audio-status');
  audio.pause(); audio.src = '';
  audio.src = `https://cdn.islamic.network/quran/audio/128/${selectedReciterId}/${ayah.number}.mp3`;
  audio.play().catch(() => {});
  isPlaying = true; updatePlayUI();
  document.querySelectorAll('.ayah-block').forEach(el => el.classList.remove('playing'));
  document.querySelectorAll('.ayah-play-btn').forEach(el => { el.classList.remove('playing'); el.textContent = '▶ استمع'; });
  const block = document.getElementById(`ayah-${num}`);
  const btn = document.getElementById(`play-btn-${num}`);
  if (block) { block.classList.add('playing'); block.scrollIntoView({behavior:'smooth',block:'center'}); }
  if (btn) { btn.classList.add('playing'); btn.textContent = '⏸ إيقاف'; }
  if (status) status.textContent = `▶ الآية ${num}`;
  audio.onended = () => {
    const nextAyah = currentAyahs.find(a => a.numberInSurah === num + 1);
    if (nextAyah) playAyahByNum(nextAyah.numberInSurah);
    else { isPlaying = false; updatePlayUI(); }
  };
}

function prevAyah() { audio.currentTime = Math.max(0, audio.currentTime - 10); }
function nextAyah() { audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); }

function togglePlay() {
  if (isPlaying) { audio.pause(); isPlaying = false; }
  else { audio.play().catch(() => {}); isPlaying = true; }
  updatePlayUI();
}

function stopAudio() {
  audio.pause(); audio.src = ''; isPlaying = false;
  document.querySelectorAll('.ayah-block').forEach(el => el.classList.remove('playing'));
  document.querySelectorAll('.ayah-play-btn').forEach(el => { el.classList.remove('playing'); el.textContent = '▶ استمع'; });
  document.getElementById('mini-player').classList.remove('show');
  updatePlayUI();
}

function updatePlayUI() {
  document.getElementById('mini-play-btn').textContent = isPlaying ? '⏸' : '▶';
  const btn = document.getElementById('main-play-btn');
  if (btn) btn.textContent = isPlaying ? '⏸' : '▶';
}

function changeFontSize(d) {
  fontSize = Math.max(1.0, Math.min(2.2, fontSize + d));
  document.querySelectorAll('.ayah-text').forEach(el => el.style.fontSize = fontSize + 'rem');
}

async function toggleTranslation() {
  showTranslation = !showTranslation;
  const btn = document.getElementById('trans-btn');
  btn.classList.toggle('active', showTranslation);
  if (showTranslation) {
    btn.textContent = '⏳ جاري...';
    try {
      const res = await fetch(`https://api.alquran.cloud/v1/surah/${currentSurah.number}/ar.muyassar`);
      const data = await res.json();
      data.data.ayahs.forEach(a => {
        const el = document.getElementById(`tr-${a.numberInSurah}`);
        if (el) { el.textContent = a.text; el.classList.add('show'); }
      });
    } catch(e) {}
    btn.textContent = '🌐 إخفاء';
  } else {
    document.querySelectorAll('.ayah-translation').forEach(el => el.classList.remove('show'));
    btn.textContent = '🌐 تفسير';
  }
}

function toggleBookmark(num) {
  const idx = bookmarks.findIndex(b => b.surah === num);
  if (idx >= 0) bookmarks.splice(idx, 1);
  else bookmarks.push({ surah: num, name: currentSurah.name, verses: currentSurah.verses });
  localStorage.setItem('q_bookmarks', JSON.stringify(bookmarks));
  const btn = document.getElementById('bm-btn');
  const isNow = bookmarks.find(b => b.surah === num);
  btn.className = `ctrl-btn ${isNow ? 'active' : ''}`;
  btn.textContent = `🔖 ${isNow ? 'في المفضلة' : 'أضف'}`;
}

  if (!bookmarks.length) { el.innerHTML = '<div class="empty-state"><span>🔖</span>لا توجد سور في المفضلة</div>'; return; }
  el.innerHTML = bookmarks.map(b => `
    <div class="bookmark-item" onclick="openSurah(${b.surah})">
      <div class="bm-icon">📖</div>
      <div class="bm-info"><div class="bm-name">${b.name}</div><div class="bm-sub">سورة ${b.surah} • ${b.verses} آية</div></div>
      <button class="bm-del" onclick="event.stopPropagation();removeBookmark(${b.surah})">✕</button>
    </div>`).join('');
}

function removeBookmark(num) {
  bookmarks = bookmarks.filter(b => b.surah !== num);
  localStorage.setItem('q_bookmarks', JSON.stringify(bookmarks));
  renderBookmarks();
}

// ── Pages ──
function goPage(p) {
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  const nav = document.getElementById('nav-' + p);
  if (nav) nav.classList.add('active');
  const showSearch = ['home'].includes(p);
  document.getElementById('search-wrap').style.display = showSearch ? 'block' : 'none';
  if (p === 'bookmarks') renderBookmarks();
  if (p === 'reciters') renderReciters();
  if (p === 'mushaf') renderMushaf();
  if (p === 'home') { renderCats(); filterSurahs(); }
}

function goBack() { goPage('home'); }

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});

init();
</script>
